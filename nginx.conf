server {
    listen 80;
    server_name profittrack.ecomzero.com.br;

    # Frontend — arquivos estáticos do build React
    root /var/www/html/nm_services/profittrack-front/dist;
    index index.html;

    # React Router — redireciona tudo para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API — proxy reverso para Node.js (porta 3333)
    location /api {
        proxy_pass         http://localhost:3333;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 15M;
        proxy_read_timeout   60s;
    }

    # Uploads — tratados também pelo Node
    location /uploads {
        proxy_pass         http://localhost:3333;
        client_max_body_size 15M;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}

<VirtualHost *:80>
    ServerName localhost
    ServerAdmin nandomarzola1@gmail.com

    # Frontend — arquivos estáticos do build React
    DocumentRoot /var/www/html/nm_services/profittrack-front/dist

    <Directory /var/www/html/nm_services/profittrack-front/dist>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        # React Router — tudo cai no index.html
        FallbackResource /index.html
    </Directory>

    # API — proxy reverso para Node.js (porta 3333)
    ProxyRequests Off
    ProxyPreserveHost On

    <Location /api>
        ProxyPass        http://127.0.0.1:3333/api
        ProxyPassReverse http://127.0.0.1:3333/api
        RequestHeader    set X-Forwarded-Proto "http"
    </Location>

    # Upload máximo 15 MB
    LimitRequestBody 15728640

    ErrorLog  /var/www/html/nm_services/profittrack-backend/logs/apache-error.log
    CustomLog /var/www/html/nm_services/profittrack-backend/logs/apache-access.log combined
</VirtualHost>
